<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listes des Vœux — Académie de Versailles</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bleu:    #1a3a5c;
    --ciel:    #2d6ea0;
    --accent:  #e8a020;
    --fond:    #f5f7fa;
    --blanc:   #ffffff;
    --gris1:   #e2e8f0;
    --gris2:   #94a3b8;
    --texte:   #1e293b;
    --ligne:   #f0f4f8;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--fond);
    color: var(--texte);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--bleu);
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
  }
  .header-logo {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--bleu);
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.45rem; font-weight: 700;
    color: #fff; line-height: 1.1;
  }
  .header-text p {
    font-size: .8rem; color: rgba(255,255,255,.6);
    margin-top: 4px;
  }

  /* ── BARRE FILTRES ── */
  .controls {
    background: var(--blanc);
    border-bottom: 1px solid var(--gris1);
    padding: 18px 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
  .ctrl-group label {
    font-size: .72rem; font-weight: 600; color: var(--gris2);
    text-transform: uppercase; letter-spacing: .06em;
  }
  .ctrl-group select,
  .ctrl-group input {
    height: 38px;
    border: 1.5px solid var(--gris1);
    border-radius: 7px;
    padding: 0 12px;
    font-size: .88rem;
    font-family: 'Inter', sans-serif;
    color: var(--texte);
    background: var(--fond);
    outline: none;
    transition: border-color .15s;
    min-width: 160px;
  }
  .ctrl-group input { min-width: 240px; }
  .ctrl-group select:focus,
  .ctrl-group input:focus { border-color: var(--ciel); }

  .btn-reset {
    height: 38px;
    padding: 0 18px;
    background: var(--bleu);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: .85rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
    align-self: flex-end;
  }
  .btn-reset:hover { background: var(--ciel); }

  .results-bar {
    background: var(--blanc);
    padding: 10px 40px;
    border-bottom: 1px solid var(--gris1);
    font-size: .82rem; color: var(--gris2);
    display: flex; align-items: center; gap: 10px;
  }
  .count-badge {
    background: var(--accent);
    color: var(--bleu);
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 99px;
    font-size: .78rem;
  }

  /* ── TABLEAU ── */
  .table-wrap {
    padding: 24px 40px 40px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--blanc);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 8px rgba(0,0,0,.07);
    font-size: .84rem;
  }
  thead { background: var(--bleu); }
  thead th {
    padding: 13px 14px;
    text-align: left;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: .78rem;
    color: rgba(255,255,255,.85);
    letter-spacing: .04em;
    text-transform: uppercase;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--accent); }
  thead th.sorted { color: var(--accent); }
  thead th .sort-icon { margin-left: 4px; opacity: .6; font-size: .7rem; }

  tbody tr {
    border-bottom: 1px solid var(--ligne);
    transition: background .1s;
  }
  tbody tr:hover { background: #eef4fb; }
  tbody tr:last-child { border-bottom: none; }

  td { padding: 11px 14px; vertical-align: top; }

  .td-etab { font-weight: 500; color: var(--bleu); max-width: 280px; }
  .td-rne { font-size: .75rem; font-weight: 400; color: var(--gris2); margin-top: 2px; }
  .td-code { font-family: monospace; font-size: .82rem; color: var(--gris2); }

  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 99px;
    font-size: .73rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-dept { background: #dbeafe; color: #1e40af; }
  .badge-mef  { background: #fef3c7; color: #92400e; }
  .badge-sco  { background: #dcfce7; color: #166534; }
  .badge-app  { background: #f3e8ff; color: #6b21a8; }
  .badge-opt  { background: #ffe4e6; color: #9f1239; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--gris2);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: .95rem; }

  /* Pagination */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 0 40px 40px;
    flex-wrap: wrap;
  }
  .page-btn {
    height: 34px; min-width: 34px; padding: 0 10px;
    border: 1.5px solid var(--gris1);
    border-radius: 7px;
    background: var(--blanc);
    color: var(--texte);
    font-size: .84rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .12s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--ciel); color: var(--ciel); }
  .page-btn.active { background: var(--bleu); color: #fff; border-color: var(--bleu); }
  .page-btn:disabled { opacity: .35; cursor: default; }
  .page-info { font-size: .82rem; color: var(--gris2); padding: 0 4px; }

  @media (max-width: 700px) {
    header, .controls, .results-bar, .table-wrap, .pagination { padding-left: 16px; padding-right: 16px; }
    .ctrl-group input { min-width: 180px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">AV</div>
  <div class="header-text">
    <h1>Liste des Vœux d'Affectation</h1>
    <p>Académie de Versailles · Mai 2026 · Tableau créé par M. GIRARDIN Yannick</p>
  </div>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label>Recherche</label>
    <input type="text" id="search" placeholder="Établissement, formation…">
  </div>
  <div class="ctrl-group">
    <label>Département</label>
    <select id="filDept">
      <option value="">Tous</option>
      <option value="78">Yvelines (78)</option>
      <option value="91">Essonne (91)</option>
      <option value="92">Hauts-de-Seine (92)</option>
      <option value="95">Val-d'Oise (95)</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Type (MEF)</label>
    <select id="filMef">
      <option value="">Tous</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Statut</label>
    <select id="filStatut">
      <option value="">Tous</option>
    </select>
  </div>
  <button class="btn-reset" onclick="resetFilters()">Réinitialiser</button>
</div>

<div class="results-bar">
  <span class="count-badge" id="countBadge">0</span>
  <span id="countLabel">résultats</span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('e')" id="th-e">Établissement <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('d')" id="th-d">Dépt <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('c')" id="th-c">Code Vœux <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('m')" id="th-m">MEF <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('f')" id="th-f">Formation <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('s')" id="th-s">Statut <span class="sort-icon">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">🔍</div>
    <p>Aucun résultat pour ces critères.</p>
  </div>
</div>
<div class="pagination" id="pagination"></div>

  let cls = 'badge-sco';
  if (s.includes('APPRENTI')) cls = 'badge-app';
  else if (s.includes('Option') || s.includes('option') || s.includes('Ens.')) cls = 'badge-opt';
  return `<span class="badge ${cls}">${esc(s)}</span>`;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Populate filter dropdowns
function initFilters() {
  const mefs = [...new Set(RAW.map(r=>r.m).filter(Boolean))].sort();
  const statuts = [...new Set(RAW.map(r=>r.s).filter(Boolean))].sort();
  const selMef = document.getElementById('filMef');
  const selStat = document.getElementById('filStatut');
  mefs.forEach(m => { const o = document.createElement('option'); o.value=m; o.textContent=m; selMef.appendChild(o); });
  statuts.forEach(s => { const o = document.createElement('option'); o.value=s; o.textContent=s; selStat.appendChild(o); });
}

function getFilters() {
  return {
    search: document.getElementById('search').value.trim().toLowerCase(),
    dept: document.getElementById('filDept').value,
    mef: document.getElementById('filMef').value,
    statut: document.getElementById('filStatut').value,
  };
}

function applyFilters() {
  const f = getFilters();
  filtered = RAW.filter(r => {
    if (f.dept && r.d !== f.dept) return false;
    if (f.mef && r.m !== f.mef) return false;
    if (f.statut && r.s !== f.statut) return false;
    if (f.search) {
      const hay = (r.e + ' ' + r.f + ' ' + r.m + ' ' + r.c).toLowerCase();
      if (!hay.includes(f.search)) return false;
    }
    return true;
  });
  // sort
  filtered.sort((a,b) => {
    const va = (a[sortCol]||'').toString().toLowerCase();
    const vb = (b[sortCol]||'').toString().toLowerCase();
    return sortAsc ? va.localeCompare(vb,'fr') : vb.localeCompare(va,'fr');
  });
  currentPage = 1;
  render();
}

function render() {
  const total = filtered.length;
  document.getElementById('countBadge').textContent = total.toLocaleString('fr');
  document.getElementById('countLabel').textContent = total === 1 ? 'résultat' : 'résultats';

  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('emptyState');

  if (page.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = page.map(r => `
      <tr>
        <td class="td-etab">
          ${esc(r.e.replace(/ \([A-Z0-9]+\)$/,''))}
          <div class="td-rne">${esc(r.e.match(/\(([^)]+)\)$/)?.[1]||'')}</div>
        </td>
        <td>${badgeDept(r.d)}</td>
        <td class="td-code">${esc(r.c)}</td>
        <td>${badgeMef(r.m)}</td>
        <td>${esc(r.f)}</td>
        <td>${badgeStatut(r.s)}</td>
      </tr>`).join('');
  }

  renderPagination(total);
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  let html = '';
  html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;

  // Smart range
  let pages = [];
  if (totalPages <= 7) {
    for (let i=1;i<=totalPages;i++) pages.push(i);
  } else {
    pages = [1];
    if (currentPage > 3) pages.push('…');
    for (let i=Math.max(2,currentPage-1); i<=Math.min(totalPages-1,currentPage+1); i++) pages.push(i);
    if (currentPage < totalPages - 2) pages.push('…');
    pages.push(totalPages);
  }

  pages.forEach(p => {
    if (p === '…') {
      html += `<span class="page-info">…</span>`;
    } else {
      html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }
  });

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  html += `<span class="page-info">Page ${currentPage}/${totalPages}</span>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = true; }
  // Update header icons
  ['e','d','c','m','f','s'].forEach(c => {
    const th = document.getElementById('th-'+c);
    if (!th) return;
    th.classList.toggle('sorted', c === sortCol);
    th.querySelector('.sort-icon').textContent = c === sortCol ? (sortAsc ? '↑' : '↓') : '↕';
  });
  applyFilters();
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filDept').value = '';
  document.getElementById('filMef').value = '';
  document.getElementById('filStatut').value = '';
  applyFilters();
}

// Events
['search','filDept','filMef','filStatut'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener(id==='search' ? 'input' : 'change', applyFilters);
});

initFilters();
applyFilters();
</script>
</body>
</html>
